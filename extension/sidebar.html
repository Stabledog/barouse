<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Barouse</title>
  <link rel="stylesheet" href="sidebar.css">
</head>
<body>
  <div id="viewport">
    <div id="settings-editor" class="hidden">
      <textarea id="settings-textarea" spellcheck="false"></textarea>
      <div id="settings-controls">
        <button id="settings-save">Save</button>
        <button id="settings-cancel">Cancel</button>
      </div>
      <div id="settings-error" class="hidden"></div>
    </div>
    <div id="error-panel" class="hidden">
      <div class="error-panel-content">
        <div class="error-panel-icon">&#x26A0;</div>
        <h2>Site unavailable</h2>
        <p id="error-panel-message">This site cannot be displayed in Barouse.</p>
        <div class="error-panel-actions">
          <button id="error-open-tab">Open in tab</button>
          <button id="error-retry">Try again</button>
        </div>
      </div>
    </div>
    <div id="add-site-dialog" class="hidden">
      <div class="add-site-content">
        <h2>Add site button</h2>
        <div class="add-site-url-row">
          <a id="add-site-url" target="_blank" rel="noopener"></a>
          <button id="add-site-copy" title="Copy URL">Copy</button>
        </div>
        <label for="add-site-label">Label</label>
        <input type="text" id="add-site-label" maxlength="20" autocomplete="off">
        <div class="add-site-actions">
          <button id="add-site-save">Add</button>
          <button id="add-site-cancel">Cancel</button>
        </div>
      </div>
    </div>
  </div>
  <div id="toolbar"></div>
  <div id="context-menu" class="hidden">
    <ul>
      <li id="ctx-reload">Reload page</li>
      <li id="ctx-back">Back</li>
      <li id="ctx-forward">Forward</li>
      <li class="ctx-separator"></li>
      <li id="ctx-zoom-in">Zoom in</li>
      <li id="ctx-zoom-out">Zoom out</li>
      <li id="ctx-zoom-reset">Reset zoom (100%)</li>
      <li class="ctx-separator"></li>
      <li id="ctx-launch-tab">Launch in new tab</li>
    </ul>
  </div>
  <script type="module" src="sidebar.js"></script>
</body>
</html>
